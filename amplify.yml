version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install pnpm and dependencies
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
    build:
      commands:
        # Create the .env.production file at build time so runtime SSR functions have access to env variables
        - echo "PAYLOAD_SECRET=$PAYLOAD_SECRET" >> .env.production
        - echo "DATABASE_URI=$DATABASE_URI" >> .env.production
        - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env.production
        - echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL" >> .env.production
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.production
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production
        - echo "S3_REGION=$S3_REGION" >> .env.production
        - echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> .env.production
        - echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> .env.production
        # Build the Next.js application (`pnpm build` also runs `payload generate:importmap` first,
        # which is required so the Payload admin views can locate every collection's components.
        # Without this step, /admin would render Payload's NotFoundClient.)
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
